name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "проект-парсеров-цен-на-рыбу-253cc" ]
  pull_request:
    branches: [ "main", "проект-парсеров-цен-на-рыбу-253cc" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # <-- Добавлен таймаут для всего джоба

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio flake8

    - name: Lint with flake8
      run: |
        # Останавливаем сборку только на критических ошибках синтаксиса
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Предупреждения просто выводим, но не ломаем сборку
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests with verbose output
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        # -s нужен, чтобы тесты не зависали при ожидании вывода
        pytest tests/ -v -s --tb=short

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t parserriba:latest .
      
    - name: Test Docker container
      run: docker run --rm parserriba:latest echo "Docker build successful"

    - name: Run Parser Demo (1 store, limited)
      run: |
        # Запускаем парсер в демо-режиме: только Пятерочка, 1 категория, headless
        # Таймаут 5 минут для демонстрации
        timeout 300 docker run --rm \
          -e PYTHONUNBUFFERED=1 \
          parserriba:latest \
          python main.py \
            --store pyaterochka \
            --category fish_fresh \
            --log-level INFO \
            --headless \
            --config config.yaml
      continue-on-error: true
      
    - name: Show demo results
      run: |
        echo "=== Демо-запуск завершен ==="
        echo "Проверка созданных файлов:"
        ls -la data/ 2>/dev/null || echo "Директория data не создана (парсинг мог не завершиться)"
        echo ""
        echo "Последние строки логов:"
        tail -n 20 logs/parser_riba.log 2>/dev/null || echo "Логфайл не найден"
