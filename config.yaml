# Конфигурация ParserRiba
# Основные настройки проекта

project:
  name: "ParserRiba"
  version: "1.0.0"
  description: "Парсер цен на рыбные товары для российских сетей"

# Настройки браузеров и запросов
browser:
  headless: true
  timeout: 30000  # мс
  user_agent_rotation: true
  fingerprinting: true  # Включить цифровые отпечатки

# Сетевые настройки
network:
  max_retries: 3
  retry_delay: 5  # секунды
  proxy_rotation: true
  request_timeout: 15  # секунд

# Стратегии обхода защит
anti_bot:
  random_delays: true
  min_delay: 1.0  # секунды
  max_delay: 3.0  # секунды
  scroll_enabled: true
  captcha_solver: "manual"  # manual, 2captcha, anticaptcha

# Логирование
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/parser_riba.log"
  console: true
  colors: true

# Магазины и их настройки
stores:
  pyaterochka:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
      - "fish_smoked"
      - "fish_canned"
    region_id: "77"  # Москва по умолчанию
    
  magnit:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
    city_id: "77"
    
  lenta:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
      - "fish_red"
    region: "msk"
    shop_id: "1001"
    
  auchan:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
    region: "msk"
    shop_id: "1"
    
  okey:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
    store_id: "101"
    
  perekrestok:
    enabled: false  # Требует авторизации/cookies
    categories:
      - "fish_fresh"
    client_id: "web"

# Вывод данных
output:
  format: "json"  # json, csv, excel
  directory: "data"
  filename_pattern: "{store}_{category}_{date}.json"
  pretty_print: true

# База знаний
knowledge_base:
  path: "knowledge_base"
  auto_reload: true
