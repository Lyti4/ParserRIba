version: '3.8'

services:
  parserriba:
    build: .
    container_name: parserriba
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
      # Пример передачи прокси через переменные окружения (можно переопределить в .env)
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    # Профиль запуска: можно запускать конкретные магазины
    # command: python main.py --shop pyaterochka --category fish
    restart: unless-stopped
