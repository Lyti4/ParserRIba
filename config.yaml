# config.yaml - Конфигурация ParserRiba
# Основные настройки проекта

project:
  name: "ParserRiba"
  version: "1.0.0"
  description: "Парсер цен на рыбные товары для российских сетей"

# Настройки браузеров и запросов
browser:
  headless: true
  headless_mode: "auto"  # auto, true, false, "virtual" (для Linux-серверов)
  timeout: 30000  # мс
  user_agent_rotation: true
  fingerprinting: true  # Включить цифровые отпечатки через BrowserForge
  
  # Camoufox настройки
  camoufox:
    humanize: true  # Human-like курсор (C++ реализация надёжнее)
    geoip: false  # Автоматическое согласование geoip + прокси
    block_images: true  # Блокировка изображений
    block_webgl: true  # Блокировка WebGL
    block_resources: true  # Блокировка трекеров и аналитики
    addons: []  # Пути к аддонам (например, ["addons/ublock"])
    
  # Fingerprint настройки
  fingerprint:
    auto_generate: true  # Автоматическая генерация отпечатков через BrowserForge
    canvas_mode: "noise"  # noise, block, allow
    webrtc_mode: "spoof"  # spoof, block, allow
    webgl:
      enabled: true
      vendor: "auto"  # auto или конкретный vendor
      renderer: "auto"  # auto или конкретный renderer
    fonts:
      mode: "os_match"  # os_match, custom
      custom_list: []  # Список шрифтов если mode=custom

# Сетевые настройки
network:
  max_retries: 3
  retry_delay: 5  # секунды
  proxy_rotation: true
  request_timeout: 15  # секунд
  
  # Proxy с geoip согласованием
  proxy:
    geoip_enabled: false  # Включить согласование региона прокси
    default_region: "RU"  # Регион по умолчанию

# Стратегии обхода защит
anti_bot:
  random_delays: true
  min_delay: 1.0  # секунды
  max_delay: 3.0  # секунды
  scroll_enabled: true
  scroll_human_like: true  # Human-like скроллинг
  captcha_solver: "manual"  # manual, 2captcha, anticaptcha

# Логирование
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/parser_riba.log"
  console: true
  colors: true
  json_logs: false  # Включить JSON-логи для LogStreamer
  json_file: "logs/parser_riba.json"

# Магазины и их настройки
stores:
  pyaterochka:
    enabled: true
    categories:
      - "Рыба и морепродукты"
      - "Копченая и соленая рыба"
      - "Икра и рыбные деликатесы"
      - "Рыбные консервы"
    region_id: "77"  # Москва по умолчанию

  magnit:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
    city_id: "77"

  lenta:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
      - "fish_red"
    region: "msk"
    shop_id: "1001"

  auchan:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
    region: "msk"
    shop_id: "1"

  okey:
    enabled: true
    categories:
      - "fish_fresh"
      - "fish_frozen"
    store_id: "101"

  perekrestok:
    enabled: false  # Требует авторизации/cookies
    categories:
      - "fish_fresh"
    client_id: "web"

# Вывод данных
output:
  format: "json"  # json, csv, excel
  directory: "data"
  filename_pattern: "{store}_{category}_{date}.json"
  pretty_print: true
  
  # Метрики
  export_metrics: true  # Экспорт метрик (время, блокировки)

# База знаний
knowledge_base:
  path: "knowledge_base"
  auto_reload: true
